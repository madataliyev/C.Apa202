<!DOCTYPE html>
<html>
<head>
    <title>table </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h2>Start Bootstrap</h2>
        <ul>
            <li>Portfolio</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>

    <div class="header">
        <h1>Start Bootstrap</h1>
        <p>Graphic Artist - Web Designer - Illustrator</p>
    </div>

    <div class="section">
        <h2>Portfolio</h2>

        <div class="cards">
            <div class="card">
                <img src="https://startbootstrap.github.io/startbootstrap-freelancer/assets/img/portfolio/cabin.png">
            </div>

            <div class="card">
                <img src="https://startbootstrap.github.io/startbootstrap-freelancer/assets/img/portfolio/cake.png">
            </div>

            <div class="card">
                <img src="https://startbootstrap.github.io/startbootstrap-freelancer/assets/img/portfolio/circus.png">
            </div>
        </div>

    </div>

    <div class="section about">
        <h2>About</h2>
        <p>Freelancer is a free bootstrap theme created by Start Bootstrap.</p>
    </div>
    
    <div class="section">
        <h2>Contact Me</h2>
        <input type="text" placeholder="Full Name"><br>
        <input type="email" placeholder="Email Address"><br>
        <textarea placeholder="Message"></textarea><br>
        <button>Send</button>
    </div>

</body>
</html>
